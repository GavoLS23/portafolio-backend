name: Scala CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (Scala 3)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - name: Cache Ivy & Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/*.sbt') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Compile
        run: sbt compile

      - name: Run tests
        run: sbt test

      # Opcional pero recomendado si usas sbt-assembly
      - name: Assembly (fat JAR)
        run: sbt assembly

      # Dependency graph (solo en master)
      - name: Upload dependency graph
        if: github.ref == 'refs/heads/master'
        uses: scalacenter/sbt-dependency-submission@v2
